OpenAI:
  ApiKey: ""
  Model: "gpt-5-nano"

Anthropic:
  ApiKey: ""
  Model: "claude-haiku-4-5"

Gemini:
  ApiKey: ""
  Model: "gemini-2.5-flash"

OpenAICompatible:
  Endpoint: "http://localhost:1234/v1"
  ApiKey: "lm-studio"
  Model: "default"

GitHubCopilot:
  Model: "gpt-4.1"
  CliPath: ""
  CliUrl: ""
  LogLevel: "info"
  GitHubToken: ""
  # Set UseLoggedInUser to false only when you want to force explicit token auth.
  # UseLoggedInUser: true
  AutoStart: true
  AutoRestart: true

CorporatePlanning:
  MaxAgents: 4
  MaxIterations: 8

ThinkingLevel: "low"

PersistMemory: true

# Optional custom Agent Skills can be added under a sibling ./skills directory.

Jobs:
  - Name: "downloads-cleanup"
    Prompt: "Organize files in Downloads by type"
    Provider: "OpenAI"
    Workflow: "single-agent"
    AutoApprove: true
    AllowedTools: "GetKnownFolder, ListDirectory, MoveFile, MoveFiles, CreateDirectory"
    PersistMemory: false
    ThinkingLevel: "low"
    Schedule: "Daily at midnight"
    Enabled: true

  - Name: "compatible-system-info"
    Prompt: "Gather basic system information for this machine. Use available commands to report the OS, hostname, current user, current working directory, and installed .NET SDK/runtime details. Do not make changes."
    Provider: "OpenAICompatible"
    Workflow: "single-agent"
    AutoApprove: true
    AllowedTools: "RunCommand"
    PersistMemory: false
    ThinkingLevel: "low"
    Enabled: false

  - Name: "repo-build-check"
    Prompt: "Build the repository next to this config file with dotnet and summarize any failures."
    Provider: "Anthropic"
    Workflow: "corporate-planning"
    AutoApprove: true
    AllowedTools: "RunDotNetCommand, ReadTextFile, ListDirectory"
    PersistMemory: false
    ThinkingLevel: "medium"
    Enabled: false

  - Name: "gemini-repo-summary"
    Prompt: "Inspect the repository next to this config file and summarize the main architecture and any obvious risks without making changes."
    Provider: "Gemini"
    Workflow: "single-agent"
    AutoApprove: false
    AllowedTools: "ListDirectory, ReadTextFile, ReadTextFileLines, GetTextFileLength"
    PersistMemory: false
    ThinkingLevel: "medium"
    Enabled: false

  - Name: "copilot-repo-audit"
    Prompt: "Inspect the repository next to this config file and summarize the highest-risk issues without making changes."
    Provider: "GitHubCopilot"
    Workflow: "corporate-planning"
    AutoApprove: false
    AllowedTools: "ListDirectory, ReadTextFile, ReadTextFileLines, GetTextFileLength"
    PersistMemory: false
    ThinkingLevel: "medium"
    Enabled: false

  - Name: "personal-whatsapp-reply"
    Prompt: 'Use the whatsapp-personal-channel skill. Check bridge health first with "node tools/whatsapp-personal-channel/channel.mjs health". Then inspect unread inbound messages with "node tools/whatsapp-personal-channel/channel.mjs list-unread --limit 10". If there are no unread messages, say so and do not send anything. If a reply is clearly warranted, send exactly one concise reply with "node tools/whatsapp-personal-channel/channel.mjs send --text \"...\"". Never contact any number outside the bridge allowlist.'
    Provider: "OpenAI"
    Workflow: "single-agent"
    AutoApprove: true
    AllowedTools: "RunCommand"
    Enabled: true
